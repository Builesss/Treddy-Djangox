<!DOCTYPE html>
<html lang="es-co">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treddy — Cuenta Bloqueada</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>
<body>

<canvas id="particles-canvas"></canvas>

<div class="login-page">
    <div class="login-card text-center py-5">
        <div class="mb-4" style="font-size: 3rem;">🔒</div>
        <h3 class="fw-bold mb-3" style="color:var(--treddy-cyan)">Acceso Bloqueado</h3>
        <p class="text-muted mb-4" style="font-size: 0.95rem;">
            Hemos detectado múltiples intentos fallidos de inicio de sesión desde tu dirección IP. 
            Por tu seguridad, hemos bloqueado temporalmente el acceso.
        </p>
        <div class="alert alert-warning mb-4 py-2" role="alert" style="font-size: 0.9rem;">
            Por favor, espera unos minutos antes de intentar nuevamente o contacta a soporte.
        </div>
        <a href="{% url 'login' %}" class="btn btn-primary w-100 py-2">
            Volver al Inicio
        </a>
    </div>
</div>

<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
<script>
(function() {
    const canvas = document.getElementById('particles-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);
    class P {
        constructor() { this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height; this.vx=(Math.random()-.5)*.3; this.vy=(Math.random()-.5)*.3; this.r=Math.random()*2+1.5; }
        update() { this.x+=this.vx; this.y+=this.vy; if(this.x<0||this.x>canvas.width)this.vx*=-1; if(this.y<0||this.y>canvas.height)this.vy*=-1; }
        draw() { ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fillStyle='#00E6F6'; ctx.fill(); }
    }
    const N=80, pts=Array.from({length:N},()=>new P());
    const go=()=>{ ctx.clearRect(0,0,canvas.width,canvas.height); pts.forEach(p=>{p.update();p.draw();}); for(let i=0;i<N;i++) for(let j=i+1;j<N;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy); if(d<100){ctx.beginPath();ctx.strokeStyle=`rgba(0,230,246,${0.1*(1-d/100)})`;ctx.lineWidth=1;ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();}} requestAnimationFrame(go); };
    go();
})();
</script>
</body>
</html>
