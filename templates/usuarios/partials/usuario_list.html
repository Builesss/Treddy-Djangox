<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center py-3">
        <h5 class="mb-0 fw-bold">👥 Directorio de Usuarios</h5>
        <button class="btn btn-primary btn-sm spa-link" data-url="{% url 'registro' %}">
            + Nuevo Usuario
        </button>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead style="background: rgba(255,255,255,0.03);">
                    <tr>
                        <th class="ps-4">Usuario</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Registro</th>
                    </tr>
                </thead>
                <tbody>
                    {% for u in usuarios %}
                    <tr>
                        <td class="ps-4">
                            <div class="fw-bold">{{ u.get_full_name|default:u.email }}</div>
                            <div class="small text-muted">{{ u.email }}</div>
                        </td>
                        <td>
                            <span class="badge {% if u.tipo_usuario == 'Administrador' %}bg-primary{% elif u.tipo_usuario == 'Vendedor' %}bg-info{% else %}bg-secondary{% endif %}">
                                {{ u.tipo_usuario }}
                            </span>
                        </td>
                        <td>
                            <span class="badge {% if u.estado == 'Activo' %}bg-success{% else %}bg-danger{% endif %}">
                                {{ u.estado }}
                            </span>
                        </td>
                        <td>{{ u.date_joined|date:"d M Y" }}</td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4" class="text-center py-4 text-muted">No hay usuarios registrados.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
<script>if (typeof bindSPALinks === 'function') bindSPALinks();</script>
