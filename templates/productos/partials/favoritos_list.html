<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0" style="color:var(--treddy-cyan);">❤️ Mis Favoritos</h2>
</div>

<div class="row g-4 mb-5">
    {% for producto in productos %}
    <div class="col-sm-6 col-md-4 col-lg-3" id="fav-card-{{ producto.pk }}">
        <div class="card h-100 border-0 shadow-sm" style="transition: transform 0.2s; cursor: pointer;">
            <div style="height: 250px; width: 100%; overflow: hidden; background-color: var(--treddy-bg); border-radius: var(--treddy-radius) var(--treddy-radius) 0 0; position: relative; border-bottom: 1px solid var(--treddy-border);">
                {% if producto.imagen %}
                    <img src="{{ producto.imagen.url }}" alt="{{ producto.nombre }}" style="width: 100%; height: 100%; object-fit: cover;">
                {% else %}
                    <div class="d-flex align-items-center justify-content-center h-100 text-muted">
                        <span style="font-size: 3rem;">📦</span>
                    </div>
                {% endif %}
                <span class="badge bg-primary position-absolute" style="top: 10px; right: 10px; font-size: 0.7rem; backdrop-filter: blur(4px);">
                    {{ producto.categoria }}
                </span>
                
                <button class="btn btn-sm btn-light position-absolute btn-fav" data-pk="{{ producto.pk }}" style="top: 10px; left: 10px; border-radius: 50%; width: 32px; height: 32px; padding: 0; display:flex; align-items:center; justify-content:center; opacity:1; transition: opacity 0.2s;">
                    ❤️
                </button>
            </div>
            
            <div class="card-body p-3 d-flex flex-column">
                <h6 class="fw-bold mb-1 text-truncate" title="{{ producto.nombre }}">{{ producto.nombre }}</h6>
                <div class="text-success fw-bold mb-2" style="font-size: 1.1rem;">
                    ${{ producto.precio_base }}
                </div>
                
                <div class="mt-auto pt-3">
                    <button class="btn btn-outline-primary w-100 btn-sm btn-add-cart" data-pk="{{ producto.pk }}">
                        🛒 Añadir al carrito
                    </button>
                </div>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="col-12 text-center py-5">
        <h5 class="text-muted">Aún no tienes productos favoritos.</h5>
        <button class="btn btn-outline-primary mt-3 spa-link" data-url="{% url 'dashboard' %}">Ir al catálogo</button>
    </div>
    {% endfor %}
</div>

<input type="hidden" id="csrfTokenFav" value="{{ csrf_token }}">
<script>
if (typeof bindSPALinks === 'function') bindSPALinks();

(function() {
    const csrf = document.getElementById('csrfTokenFav').value;
    
    document.querySelectorAll('.btn-add-cart').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            const pk = this.dataset.pk;
            const formData = new FormData();
            formData.append('csrfmiddlewaretoken', csrf);
            
            fetch('/carrito/add/' + pk + '/', {
                method: 'POST',
                body: formData,
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    Toast.fire({icon:'success', title:'Añadido al carrito'});
                }
            });
        });
    });

    document.querySelectorAll('.btn-fav').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            const pk = this.dataset.pk;
            const formData = new FormData();
            formData.append('csrfmiddlewaretoken', csrf);
            
            fetch('/favorito/toggle/' + pk + '/', {
                method: 'POST',
                body: formData,
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'removed') {
                    document.getElementById('fav-card-' + pk).remove();
                    Toast.fire({icon:'info', title:'Eliminado de favoritos'});
                }
            });
        });
    });
})();
</script>
